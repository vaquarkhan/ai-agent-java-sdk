name: Publish to Maven Central

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run mvn verify + sign only (no upload)"
        type: boolean
        default: false
      auto_publish:
        description: "Auto-publish validated bundle on Central Portal"
        type: boolean
        default: true
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: maven-central-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      # Prefer MAVEN_* names; fallback to generic GPG_* if you named secrets differently.
      - name: Verify required secrets
        shell: bash
        env:
          MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          GPG_PRIVATE_KEY_ALT: ${{ secrets.GPG_PRIVATE_KEY }}
          CENTRAL_USER: ${{ secrets.CENTRAL_PORTAL_USERNAME }}
          CENTRAL_PASS: ${{ secrets.CENTRAL_PORTAL_PASSWORD }}
        run: |
          KEY="$MAVEN_GPG_PRIVATE_KEY"
          if [ -z "$KEY" ]; then KEY="$GPG_PRIVATE_KEY_ALT"; fi
          err=0
          if [ -z "$KEY" ]; then
            echo "::error::No GPG private key secret found. Create one repository secret:"
            echo "::error::- MAVEN_GPG_PRIVATE_KEY (recommended), OR"
            echo "::error::- GPG_PRIVATE_KEY (alias)"
            echo "::error::Value = full armored key including BEGIN/END lines. docs/publishing.md"
            err=1
          elif ! echo "$KEY" | grep -q "BEGIN PGP PRIVATE KEY BLOCK"; then
            echo "::error::GPG secret must be ARMORED (must contain BEGIN PGP PRIVATE KEY BLOCK). If you have binary .gpg only, export: gpg --armor --export-secret-keys KEY_ID"
            err=1
          fi

          deploy="1"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            deploy="0"
          fi
          if [ "$deploy" = "1" ]; then
            if [ -z "$CENTRAL_USER" ] || [ -z "$CENTRAL_PASS" ]; then
              echo "::error::Missing CENTRAL_PORTAL_USERNAME or CENTRAL_PORTAL_PASSWORD (required for mvn deploy)"
              err=1
            fi
          fi
          exit "$err"

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "maven"
          server-id: central
          server-username: ${{ secrets.CENTRAL_PORTAL_USERNAME }}
          server-password: ${{ secrets.CENTRAL_PORTAL_PASSWORD }}

      # Native import avoids ghaction-import-gpg "gpg_private_key" quirks with empty/expansion.
      - name: Import GPG key (headless)
        shell: bash
        env:
          MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          GPG_PRIVATE_KEY_ALT: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          KEY="$MAVEN_GPG_PRIVATE_KEY"
          if [ -z "$KEY" ]; then KEY="$GPG_PRIVATE_KEY_ALT"; fi
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          printf '%s\n' "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
          printf '%s\n' "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          gpgconf --kill gpg-agent 2>/dev/null || true
          echo "$KEY" | gpg --batch --import --no-tty
          gpg --list-secret-keys --keyid-format LONG

      - name: Publish flags
        id: flags
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_AUTO: ${{ github.event.inputs.auto_publish }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "auto=${INPUT_AUTO:-true}" >> "$GITHUB_OUTPUT"
          else
            echo "auto=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Maven verify (dry run)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true' }}
        env:
          PW1: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
          PW2: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          GPG_PW="${PW1:-$PW2}"
          mvn -B clean verify -Pcentral-publish -Dgpg.passphrase="${GPG_PW}"

      - name: Maven deploy
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.dry_run != 'true' }}
        env:
          PW1: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
          PW2: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          GPG_PW="${PW1:-$PW2}"
          WAIT="validated"
          if [ "${{ steps.flags.outputs.auto }}" = "true" ]; then
            WAIT="published"
          fi
          mvn -B clean deploy -Pcentral-publish \
            -Dgpg.passphrase="${GPG_PW}" \
            -Dcentral.autoPublish="${{ steps.flags.outputs.auto }}" \
            -Dcentral.waitUntil="${WAIT}"
