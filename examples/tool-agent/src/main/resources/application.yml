spring:
  application:
    name: tool-agent-example

ai:
  agent:
    model-provider: demo
    model-id: tool-agent-scripted
    system-prompt: "You are a helpful assistant with weather and unit conversion tools."
    max-iterations: 10
    tool-discovery:
      enabled: true
      include-patterns:
        - "weather_*"
        - "unit_*"

server:
  port: 8094
